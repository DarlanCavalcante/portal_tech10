<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Backup Logo Tech10 - Estilo Metálico Vetorial</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body style="background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; gap: 60px;">

  <!-- Logo (Estado Aberto - Verde) -->
  <div>
    <p style="color:#555; font-size:12px; text-align:center; margin-bottom:10px;">ESTADO: ABERTO (VERDE)</p>
    <div class="logo-text">
      TECH<span class="logo-1">1</span><span class="logo-toggle-wrap"><span class="toggle-pill open"><span class="toggle-dot"></span></span></span>
    </div>
  </div>

  <!-- Logo (Estado Fechado - Vermelho) -->
  <div>
    <p style="color:#555; font-size:12px; text-align:center; margin-bottom:10px;">ESTADO: FECHADO (VERMELHO)</p>
    <div class="logo-text">
      TECH<span class="logo-1">1</span><span class="logo-toggle-wrap"><span class="toggle-pill closed"><span class="toggle-dot"></span></span></span>
    </div>
  </div>

</body>
</html>
